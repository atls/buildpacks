name: Docker release

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/docker-release.yaml'
      - '.yarn/**'
      - 'builders/**'
      - 'buildpacks/**'
      - 'extensions/**'
      - 'libcnb/**'
      - 'package.json'
      - 'stacks/**'
      - 'yarn.lock'

env:
  STACK_ID: tech.atlantislab.stacks.node
  PACK_VERSION: 0.40.4
  PLATFORMS: linux/amd64,linux/arm64

concurrency:
  group: docker-release
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      builder-tag: ${{ steps.release-config.outputs.builder-tag }}
      node-image: ${{ steps.release-config.outputs.node-image }}
      node-major: ${{ steps.release-config.outputs.node-major }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release configuration
        id: release-config
        run: |
          node_image="$(awk -F= '$1 == "ARG node_image" { print $2; exit }' stacks/node/base/Dockerfile)"
          [[ "${node_image}" =~ ^node:([0-9]+)-slim$ ]]

          node_major="${BASH_REMATCH[1]}"

          echo "builder-tag=${node_major}" >> "${GITHUB_OUTPUT}"
          echo "node-image=${node_image}" >> "${GITHUB_OUTPUT}"
          echo "node-major=${node_major}" >> "${GITHUB_OUTPUT}"

      - name: Verify Node.js major before publishing
        env:
          NODE_IMAGE: ${{ steps.release-config.outputs.node-image }}
          NODE_MAJOR: ${{ steps.release-config.outputs.node-major }}
        run: docker run --rm --pull always "${NODE_IMAGE}" node --version | grep "^v${NODE_MAJOR}\\."

  build-stack-base:
    name: Build stack base
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish atlantislab/stack-node:base
        uses: docker/build-push-action@v7.1.0
        with:
          context: stacks/node/base
          build-args: |
            node_image=${{ needs.validate-release.outputs.node-image }}
            stack_id=${{ env.STACK_ID }}
          platforms: ${{ env.PLATFORMS }}
          pull: true
          push: true
          tags: atlantislab/stack-node:base

  build-stack:
    name: Build stack ${{ matrix.tag }}
    needs: build-stack-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: build
            context: stacks/node/build
          - tag: run
            context: stacks/node/run
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish atlantislab/stack-node:${{ matrix.tag }}
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{ matrix.context }}
          build-args: base_image=atlantislab/stack-node:base
          platforms: ${{ env.PLATFORMS }}
          pull: true
          push: true
          tags: atlantislab/stack-node:${{ matrix.tag }}

  publish-extensions:
    name: Publish extension ${{ matrix.name }}
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: curl
            directory: extensions/curl
            image: atlantislab/buildpack-extension-curl:0.0.1
          - name: htop
            directory: extensions/htop
            image: atlantislab/buildpack-extension-htop:0.0.1
          - name: graphql-hive
            directory: extensions/graphql-hive
            image: atlantislab/buildpack-extension-graphql-hive:0.0.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish ${{ matrix.image }}
        working-directory: ${{ matrix.directory }}
        run: pack extension package ${{ matrix.image }} --target linux/amd64 --target linux/arm64 --publish

  publish-buildpack-components:
    name: Publish buildpack ${{ matrix.name }}
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: require-extension
            directory: buildpacks/require-extension
            image: atlantislab/buildpack-require-extension:0.1.1
          - name: yarn-install
            directory: buildpacks/yarn-install
            image: atlantislab/buildpack-yarn-install:0.1.1
          - name: yarn-cache
            directory: buildpacks/yarn-cache
            image: atlantislab/buildpack-yarn-cache:0.1.1
          - name: yarn-workspace-start
            directory: buildpacks/yarn-workspace-start
            image: atlantislab/buildpack-yarn-workspace-start:0.1.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.validate-release.outputs.node-major }}
          cache: yarn

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish ${{ matrix.image }}
        working-directory: ${{ matrix.directory }}
        run: pack buildpack package ${{ matrix.image }} --config ./package.toml --target linux/amd64 --target linux/arm64 --publish

  publish-buildpack-group:
    name: Publish buildpack group
    needs: publish-buildpack-components
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish atlantislab/buildpack-yarn-workspace:0.1.1
        working-directory: buildpacks/yarn-workspace
        run: pack buildpack package atlantislab/buildpack-yarn-workspace:0.1.1 --config ./package.toml --target linux/amd64 --target linux/arm64 --publish

  publish-builder:
    name: Publish builder
    needs:
      - build-stack
      - publish-extensions
      - publish-buildpack-group
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish builder
        env:
          BUILDER_TAG: ${{ needs.validate-release.outputs.builder-tag }}
        run: pack builder create "atlantislab/builder-base:${BUILDER_TAG}" --verbose --config builders/base/builder.toml --publish

  verify-manifests:
    name: Verify manifest ${{ matrix.image }}
    needs: publish-builder
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - atlantislab/stack-node:base
          - atlantislab/stack-node:build
          - atlantislab/stack-node:run
          - atlantislab/buildpack-yarn-workspace:0.1.1
          - atlantislab/buildpack-extension-curl:0.0.1
    steps:
      - name: Verify linux/amd64 and linux/arm64
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          docker buildx imagetools inspect "${IMAGE}" | tee manifest.txt
          grep -q linux/amd64 manifest.txt
          grep -q linux/arm64 manifest.txt

  verify-builder-manifest:
    name: Verify builder manifest
    needs:
      - publish-builder
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify linux/amd64 and linux/arm64
        env:
          BUILDER_TAG: ${{ needs.validate-release.outputs.builder-tag }}
        run: |
          docker buildx imagetools inspect "atlantislab/builder-base:${BUILDER_TAG}" | tee manifest.txt
          grep -q linux/amd64 manifest.txt
          grep -q linux/arm64 manifest.txt

  verify-node:
    name: Verify Node.js ${{ matrix.image }} ${{ matrix.platform }}
    needs:
      - publish-builder
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: atlantislab/stack-node:build
            platform: linux/amd64
            entrypoint: ''
            command: node --version
          - image: atlantislab/stack-node:build
            platform: linux/arm64
            entrypoint: ''
            command: node --version
          - image: atlantislab/stack-node:run
            platform: linux/amd64
            entrypoint: ''
            command: node --version
          - image: atlantislab/stack-node:run
            platform: linux/arm64
            entrypoint: ''
            command: node --version
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Verify Node.js major
        env:
          COMMAND: ${{ matrix.command }}
          ENTRYPOINT: ${{ matrix.entrypoint }}
          EXPECTED_NODE_MAJOR: ${{ needs.validate-release.outputs.node-major }}
          IMAGE: ${{ matrix.image }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          if [[ -n "${ENTRYPOINT}" ]]; then
            docker run --rm --pull always --platform "${PLATFORM}" --entrypoint "${ENTRYPOINT}" "${IMAGE}" ${COMMAND} | grep "^v${EXPECTED_NODE_MAJOR}\\."
          else
            docker run --rm --pull always --platform "${PLATFORM}" "${IMAGE}" ${COMMAND} | grep "^v${EXPECTED_NODE_MAJOR}\\."
          fi

  verify-builder-node:
    name: Verify Node.js builder ${{ matrix.platform }}
    needs:
      - publish-builder
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Verify Node.js major
        env:
          BUILDER_TAG: ${{ needs.validate-release.outputs.builder-tag }}
          EXPECTED_NODE_MAJOR: ${{ needs.validate-release.outputs.node-major }}
          PLATFORM: ${{ matrix.platform }}
        run: docker run --rm --pull always --platform "${PLATFORM}" --entrypoint node "atlantislab/builder-base:${BUILDER_TAG}" --version | grep "^v${EXPECTED_NODE_MAJOR}\\."
