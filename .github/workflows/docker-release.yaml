name: GHCR image release

on:
  pull_request:
    branches:
      - master
    types:
      - closed
    paths:
      - '.github/actions/**'
      - '.github/docker-release-node-lines.json'
      - '.yarn/**'
      - '.yarnrc.yml'
      - 'builders/**'
      - 'buildpacks/**'
      - 'docker-bake.hcl'
      - 'extensions/**'
      - 'libcnb/**'
      - 'package.json'
      - 'scripts/**'
      - 'stacks/**'
      - 'tsconfig.json'
      - 'yarn.lock'

env:
  IMAGE_PREFIX: ghcr.io/atls
  REGISTRY: ghcr.io
  STACK_ID: tech.atls.stacks.node
  PACK_VERSION: 0.40.4
  PLATFORMS: linux/amd64,linux/arm64

concurrency:
  group: docker-release
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base_image: ${{ steps.bootstrap.outputs.base_image }}
      default_node_major: ${{ steps.bootstrap.outputs.default_node_major }}
      node_lines: ${{ steps.bootstrap.outputs.node_lines }}
      node_majors: ${{ steps.bootstrap.outputs.node_majors }}
      release_base_sha: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bootstrap release
        id: bootstrap
        uses: ./.github/actions/bootstrap
        with:
          sha: ${{ github.sha }}

  build-stack:
    name: Build stack Node ${{ matrix.node_line.node_major }}
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish stack images
        uses: docker/bake-action@v7
        with:
          source: .
          files: docker-bake.hcl
          targets: stack
          pull: true
          push: true
          vars: |
            IMAGE_PREFIX=${{ env.IMAGE_PREFIX }}
            STACK_ID=${{ env.STACK_ID }}
            BASE_IMAGE=${{ needs.validate-release.outputs.base_image }}
            NODE_VERSION=${{ matrix.node_line.node_major }}
            RELEASE_TAG=${{ matrix.node_line.release_tag }}
            PLATFORMS=${{ env.PLATFORMS }}

  publish-extensions:
    name: Publish extension ${{ matrix.name }}
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
              - name: curl
                directory: extensions/curl
                image-repository: ghcr.io/atls/buildpack-extension-curl
              - name: htop
                directory: extensions/htop
                image-repository: ghcr.io/atls/buildpack-extension-htop
              - name: graphql-hive
                directory: extensions/graphql-hive
                image-repository: ghcr.io/atls/buildpack-extension-graphql-hive
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish extension
        uses: ./.github/actions/publish-extension
        with:
          before-sha: ${{ needs.validate-release.outputs.release_base_sha }}
          directory: ${{ matrix.directory }}
          image-repository: ${{ matrix.image-repository }}

  publish-buildpack-components:
    name: Publish buildpack ${{ matrix.name }}
    needs: validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: require-extension
            directory: buildpacks/require-extension
            image-repository: ghcr.io/atls/buildpack-require-extension
          - name: yarn-install
            directory: buildpacks/yarn-install
            image-repository: ghcr.io/atls/buildpack-yarn-install
          - name: yarn-cache
            directory: buildpacks/yarn-cache
            image-repository: ghcr.io/atls/buildpack-yarn-cache
          - name: yarn-workspace-start
            directory: buildpacks/yarn-workspace-start
            image-repository: ghcr.io/atls/buildpack-yarn-workspace-start
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.validate-release.outputs.default_node_major }}
          cache: yarn

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish buildpackage
        uses: ./.github/actions/publish-buildpackage
        with:
          before-sha: ${{ needs.validate-release.outputs.release_base_sha }}
          directory: ${{ matrix.directory }}
          image-repository: ${{ matrix.image-repository }}
          name: ${{ matrix.name }}

  publish-composite-buildpack:
    name: Publish composite buildpack
    needs:
      - publish-buildpack-components
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish buildpackage
        uses: ./.github/actions/publish-buildpackage
        with:
          before-sha: ${{ needs.validate-release.outputs.release_base_sha }}
          directory: buildpacks/yarn-workspace
          image-repository: ${{ env.IMAGE_PREFIX }}/buildpack-yarn-workspace
          name: yarn-workspace

  verify-stack-manifests:
    name: Verify stack manifests Node ${{ matrix.node_line.node_major }}
    needs:
      - build-stack
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify stack base
        uses: ./.github/actions/verify-release-images
        with:
          image: ${{ env.IMAGE_PREFIX }}/stack-node:base-${{ matrix.node_line.release_tag }}
          platforms: ${{ env.PLATFORMS }}

      - name: Verify stack build
        uses: ./.github/actions/verify-release-images
        with:
          image: ${{ env.IMAGE_PREFIX }}/stack-node:build-${{ matrix.node_line.release_tag }}
          platforms: ${{ env.PLATFORMS }}

      - name: Verify stack run
        uses: ./.github/actions/verify-release-images
        with:
          image: ${{ env.IMAGE_PREFIX }}/stack-node:run-${{ matrix.node_line.release_tag }}
          platforms: ${{ env.PLATFORMS }}

  publish-builder:
    name: Publish builder Node ${{ matrix.node_line.node_major }}
    needs:
      - build-stack
      - publish-extensions
      - publish-composite-buildpack
      - validate-release
      - verify-stack-manifests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish builder
        uses: ./.github/actions/publish-builder
        with:
          image-prefix: ${{ env.IMAGE_PREFIX }}
          platforms: ${{ env.PLATFORMS }}
          release-tag: ${{ matrix.node_line.release_tag }}

  verify-builder-manifest:
    name: Verify builder manifest Node ${{ matrix.node_line.node_major }}
    needs:
      - publish-builder
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify builder manifest
        uses: ./.github/actions/verify-release-images
        with:
          image: ${{ env.IMAGE_PREFIX }}/builder-base:${{ matrix.node_line.release_tag }}
          platforms: ${{ env.PLATFORMS }}

  verify-node:
    name: Verify Node.js stack-node:${{ matrix.target.tag }}-${{ matrix.node_line.node_major }} ${{ matrix.target.platform }}
    needs:
      - scan-release-images
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
        target:
          - tag: build
            platform: linux/amd64
            entrypoint: ''
            command: node --version
          - tag: build
            platform: linux/arm64
            entrypoint: ''
            command: node --version
          - tag: run
            platform: linux/amd64
            entrypoint: ''
            command: node --version
          - tag: run
            platform: linux/arm64
            entrypoint: ''
            command: node --version
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Node.js major
        uses: ./.github/actions/verify-release-images
        with:
          expected-node-major: ${{ matrix.node_line.node_major }}
          image: ${{ env.IMAGE_PREFIX }}/stack-node:${{ matrix.target.tag }}-${{ matrix.node_line.release_tag }}
          node-command: ${{ matrix.target.command }}
          node-entrypoint: ${{ matrix.target.entrypoint }}
          platforms: ${{ matrix.target.platform }}

  verify-builder-node:
    name: Verify Node.js builder ${{ matrix.node_line.node_major }} ${{ matrix.platform }}
    needs:
      - scan-release-images
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Node.js major
        uses: ./.github/actions/verify-release-images
        with:
          expected-node-major: ${{ matrix.node_line.node_major }}
          image: ${{ env.IMAGE_PREFIX }}/builder-base:${{ matrix.node_line.release_tag }}
          node-command: --version
          node-entrypoint: node
          platforms: ${{ matrix.platform }}

  scan-release-images:
    name: Scan ${{ matrix.image_kind }} Node ${{ matrix.node_line.node_major }} ${{ matrix.platform }}
    needs:
      - validate-release
      - verify-builder-manifest
      - verify-stack-manifests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
        platform:
          - linux/amd64
          - linux/arm64
        image_kind:
          - builder-base
          - stack-node-base
          - stack-node-build
          - stack-node-run
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan release image
        uses: ./.github/actions/scan-release-images
        with:
          image-kind: ${{ matrix.image_kind }}
          image-prefix: ${{ env.IMAGE_PREFIX }}
          node-major: ${{ matrix.node_line.node_major }}
          platform: ${{ matrix.platform }}
          release-tag: ${{ matrix.node_line.release_tag }}

  update-channel-tags:
    name: Update channel tags Node ${{ matrix.node_line.node_major }}
    needs:
      - scan-release-images
      - verify-builder-node
      - verify-node
      - validate-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Update channel tags
        uses: ./.github/actions/update-channel-tags
        with:
          default-node-major: ${{ needs.validate-release.outputs.default_node_major }}
          image-prefix: ${{ env.IMAGE_PREFIX }}
          node-major: ${{ matrix.node_line.node_major }}
          release-tag: ${{ matrix.node_line.release_tag }}
