name: GHCR image release

on:
  push:
    branches:
      - master
    paths:
      - '.yarn/**'
      - '.yarnrc.yml'
      - 'builders/**'
      - 'buildpacks/**'
      - 'docker-bake.hcl'
      - 'extensions/**'
      - 'libcnb/**'
      - 'package.json'
      - 'scripts/**'
      - 'stacks/**'
      - 'tsconfig.json'
      - 'yarn.lock'

env:
  PACK_VERSION: 0.40.4
  REGISTRY: ghcr.io

concurrency:
  group: docker-release
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base_image: ${{ steps.release-config.outputs.base_image }}
      default_node_major: ${{ steps.release-config.outputs.default_node_major }}
      image_prefix: ${{ steps.release-config.outputs.image_prefix }}
      node_lines: ${{ steps.release-config.outputs.node_lines }}
      node_majors: ${{ steps.release-config.outputs.node_majors }}
      platforms_csv: ${{ steps.release-config.outputs.platforms_csv }}
      platforms_json: ${{ steps.release-config.outputs.platforms_json }}
      release_enabled: ${{ steps.release-eligibility.outputs.release_enabled }}
      stack_id: ${{ steps.release-config.outputs.stack_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release eligibility
        id: release-eligibility
        run: |
          release_enabled=true
          before="${{ github.event.before }}"

          if [[ "${{ github.actor }}" == "atlantis-terraformer-bot[bot]" ]]; then
            if [[ "${before}" =~ ^0+$ ]] || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}")"
            else
              changed_files="$(git diff --name-only "${before}" "${GITHUB_SHA}")"
            fi

            non_workflow_changes="$(printf '%s\n' "${changed_files}" | grep -vx '.github/workflows/docker-release.yaml' || true)"
            if [[ -z "${non_workflow_changes}" ]]; then
              release_enabled=false
              echo "::notice::Skipping GHCR image release for Terraform-managed workflow-only update."
            fi
          fi

          echo "release_enabled=${release_enabled}" >> "${GITHUB_OUTPUT}"

      - name: Resolve release configuration
        id: release-config
        run: |
          release_config="stacks/node/ghcr-release.json"

          jq -e '
            (.imagePrefix | type == "string" and length > 0) and
            (.stackId | type == "string" and length > 0) and
            (.baseImage | type == "string" and length > 0) and
            (.defaultNodeMajor | type == "number") and
            (.supportedNodeMajors | type == "array" and length > 0 and all(.[]; type == "number")) and
            (.platforms | type == "array" and length > 0 and all(.[]; type == "string" and length > 0))
          ' "${release_config}" > /dev/null

          default_node_major="$(jq -r '.defaultNodeMajor' "${release_config}")"
          if ! jq -e --argjson default_node_major "${default_node_major}" '.supportedNodeMajors | index($default_node_major)' "${release_config}" > /dev/null; then
            echo "::error::Default Node.js major '${default_node_major}' must be listed in supported Node.js majors."
            exit 1
          fi

          image_prefix="$(jq -r '.imagePrefix' "${release_config}")"
          stack_id="$(jq -r '.stackId' "${release_config}")"
          base_image="$(jq -r '.baseImage' "${release_config}")"
          platforms_csv="$(jq -r '.platforms | join(",")' "${release_config}")"
          platforms_json="$(jq -c '.platforms' "${release_config}")"
          node_lines="$(jq -c --arg sha "${GITHUB_SHA::12}" '.supportedNodeMajors | map(. as $major | {"node_major": ($major | tostring), "release_tag": (($major | tostring) + "-" + $sha)})' "${release_config}")"
          node_majors="$(jq -r '.supportedNodeMajors | map(tostring) | join(",")' "${release_config}")"

          {
            echo "base_image=${base_image}"
            echo "default_node_major=${default_node_major}"
            echo "image_prefix=${image_prefix}"
            echo "node_lines=${node_lines}"
            echo "node_majors=${node_majors}"
            echo "platforms_csv=${platforms_csv}"
            echo "platforms_json=${platforms_json}"
            echo "stack_id=${stack_id}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify base image manifest before publishing
        env:
          BASE_IMAGE: ${{ steps.release-config.outputs.base_image }}
        run: docker buildx imagetools inspect "${BASE_IMAGE}" > /dev/null

  build-stack:
    name: Build stack Node ${{ matrix.node_line.node_major }}
    needs: validate-release
    if: needs.validate-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish stack images
        uses: docker/bake-action@v6
        env:
          BASE_IMAGE: ${{ needs.validate-release.outputs.base_image }}
          IMAGE_PREFIX: ${{ needs.validate-release.outputs.image_prefix }}
          NODE_VERSION: ${{ matrix.node_line.node_major }}
          PLATFORMS: ${{ needs.validate-release.outputs.platforms_csv }}
          RELEASE_TAG: ${{ matrix.node_line.release_tag }}
          STACK_ID: ${{ needs.validate-release.outputs.stack_id }}
        with:
          files: docker-bake.hcl
          targets: stack
          push: true

  publish-extensions:
    name: Publish extension ${{ matrix.name }}
    needs: validate-release
    if: needs.validate-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: curl
            directory: extensions/curl
            image_repository: ghcr.io/atls/buildpack-extension-curl
          - name: htop
            directory: extensions/htop
            image_repository: ghcr.io/atls/buildpack-extension-htop
          - name: graphql-hive
            directory: extensions/graphql-hive
            image_repository: ghcr.io/atls/buildpack-extension-graphql-hive
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve extension image
        id: extension-image
        working-directory: ${{ matrix.directory }}
        env:
          IMAGE_REPOSITORY: ${{ matrix.image_repository }}
        run: |
          version="$(awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' extension.toml)"
          [[ -n "${version}" ]]

          echo "image=${IMAGE_REPOSITORY}:${version}" >> "${GITHUB_OUTPUT}"

      - name: Check extension version change
        id: release-change
        env:
          IMAGE: ${{ steps.extension-image.outputs.image }}
          VERSION_FILE: ${{ matrix.directory }}/extension.toml
        run: |
          before="${{ github.event.before }}"
          current_version="$(awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' "${VERSION_FILE}")"

          if [[ "${before}" =~ ^0+$ ]]; then
            changed=true
          elif git cat-file -e "${before}:${VERSION_FILE}" 2>/dev/null; then
            previous_version="$(git show "${before}:${VERSION_FILE}" | awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }')"
            if [[ "${previous_version}" != "${current_version}" ]]; then
              changed=true
            else
              changed=false
            fi
          else
            changed=true
          fi

          if [[ "${changed}" == "false" ]] && ! docker buildx imagetools inspect "${IMAGE}" > /dev/null 2>&1; then
            changed=true
          fi

          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"

      - name: Publish ${{ steps.extension-image.outputs.image }}
        if: steps.release-change.outputs.changed == 'true'
        working-directory: ${{ matrix.directory }}
        env:
          PLATFORMS: ${{ needs.validate-release.outputs.platforms_csv }}
        run: |
          targets=()
          IFS=',' read -r -a platforms <<< "${PLATFORMS}"
          for platform in "${platforms[@]}"; do
            targets+=(--target "${platform}")
          done

          pack extension package ${{ steps.extension-image.outputs.image }} "${targets[@]}" --publish

      - name: Verify linux/amd64 and linux/arm64
        if: steps.release-change.outputs.changed == 'true'
        env:
          EXPECTED_PLATFORMS: ${{ needs.validate-release.outputs.platforms_json }}
          IMAGE: ${{ steps.extension-image.outputs.image }}
        run: |
          manifest="$(docker buildx imagetools inspect "${IMAGE}" --raw)"
          jq -e --argjson expected_platforms "${EXPECTED_PLATFORMS}" '
            [.manifests[].platform | "\(.os)/\(.architecture)"] as $platforms |
            all($expected_platforms[]; . as $platform | $platforms | index($platform))
          ' <<< "${manifest}" > /dev/null

  publish-buildpack-components:
    name: Publish buildpack ${{ matrix.name }}
    needs: validate-release
    if: needs.validate-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: require-extension
            directory: buildpacks/require-extension
            image_repository: ghcr.io/atls/buildpack-require-extension
          - name: yarn-install
            directory: buildpacks/yarn-install
            image_repository: ghcr.io/atls/buildpack-yarn-install
          - name: yarn-cache
            directory: buildpacks/yarn-cache
            image_repository: ghcr.io/atls/buildpack-yarn-cache
          - name: yarn-workspace-start
            directory: buildpacks/yarn-workspace-start
            image_repository: ghcr.io/atls/buildpack-yarn-workspace-start
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.validate-release.outputs.default_node_major }}
          cache: yarn

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve buildpack image
        id: buildpack-image
        working-directory: ${{ matrix.directory }}
        env:
          IMAGE_REPOSITORY: ${{ matrix.image_repository }}
        run: |
          version="$(awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' buildpack.toml)"
          [[ -n "${version}" ]]

          echo "image=${IMAGE_REPOSITORY}:${version}" >> "${GITHUB_OUTPUT}"

      - name: Check buildpack version change
        id: release-change
        env:
          IMAGE: ${{ steps.buildpack-image.outputs.image }}
          VERSION_FILE: ${{ matrix.directory }}/buildpack.toml
        run: |
          before="${{ github.event.before }}"
          current_version="$(awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' "${VERSION_FILE}")"

          if [[ "${before}" =~ ^0+$ ]]; then
            changed=true
          elif git cat-file -e "${before}:${VERSION_FILE}" 2>/dev/null; then
            previous_version="$(git show "${before}:${VERSION_FILE}" | awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }')"
            if [[ "${previous_version}" != "${current_version}" ]]; then
              changed=true
            else
              changed=false
            fi
          else
            changed=true
          fi

          if [[ "${changed}" == "false" ]] && ! docker buildx imagetools inspect "${IMAGE}" > /dev/null 2>&1; then
            changed=true
          fi

          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"

      - name: Prepare buildpack package
        if: steps.release-change.outputs.changed == 'true'
        id: buildpack-package
        env:
          BUILDPACK_DIRECTORY: ${{ matrix.directory }}
          BUILDPACK_NAME: ${{ matrix.name }}
        run: |
          package_config="${RUNNER_TEMP}/${BUILDPACK_NAME}-package.toml"
          stage_dir="${RUNNER_TEMP}/${BUILDPACK_NAME}-buildpack"

          ./scripts/prepare-buildpack-package.sh "${BUILDPACK_DIRECTORY}" "${stage_dir}" "${package_config}"

          echo "config=${package_config}" >> "${GITHUB_OUTPUT}"

      - name: Verify buildpack package content
        if: steps.release-change.outputs.changed == 'true'
        env:
          BUILDPACK_ARCHIVE: ${{ runner.temp }}/${{ matrix.name }}
          BUILDPACK_DIRECTORY: ${{ matrix.directory }}
          PACKAGE_CONFIG: ${{ steps.buildpack-package.outputs.config }}
          PLATFORMS: ${{ needs.validate-release.outputs.platforms_csv }}
        run: |
          targets=()
          IFS=',' read -r -a platforms <<< "${PLATFORMS}"
          for platform in "${platforms[@]}"; do
            targets+=(--target "${platform}")
          done

          pack buildpack package "${BUILDPACK_ARCHIVE}" --config "${PACKAGE_CONFIG}" "${targets[@]}" --format file --pull-policy if-not-present

          for platform in "${platforms[@]}"; do
            platform_id="${platform//\//-}"
            ./scripts/verify-buildpack-package.sh "${BUILDPACK_ARCHIVE}-${platform_id}.cnb" "${BUILDPACK_DIRECTORY}"
          done

      - name: Publish ${{ steps.buildpack-image.outputs.image }}
        if: steps.release-change.outputs.changed == 'true'
        env:
          PLATFORMS: ${{ needs.validate-release.outputs.platforms_csv }}
        run: |
          targets=()
          IFS=',' read -r -a platforms <<< "${PLATFORMS}"
          for platform in "${platforms[@]}"; do
            targets+=(--target "${platform}")
          done

          pack buildpack package ${{ steps.buildpack-image.outputs.image }} --config ${{ steps.buildpack-package.outputs.config }} "${targets[@]}" --publish --pull-policy if-not-present

      - name: Verify linux/amd64 and linux/arm64
        if: steps.release-change.outputs.changed == 'true'
        env:
          EXPECTED_PLATFORMS: ${{ needs.validate-release.outputs.platforms_json }}
          IMAGE: ${{ steps.buildpack-image.outputs.image }}
        run: |
          manifest="$(docker buildx imagetools inspect "${IMAGE}" --raw)"
          jq -e --argjson expected_platforms "${EXPECTED_PLATFORMS}" '
            [.manifests[].platform | "\(.os)/\(.architecture)"] as $platforms |
            all($expected_platforms[]; . as $platform | $platforms | index($platform))
          ' <<< "${manifest}" > /dev/null

  publish-buildpack-group:
    name: Publish buildpack group
    needs:
      - publish-buildpack-components
      - validate-release
    if: needs.validate-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.buildpack-image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve buildpack group image
        id: buildpack-image
        working-directory: buildpacks/yarn-workspace
        env:
          IMAGE_PREFIX: ${{ needs.validate-release.outputs.image_prefix }}
        run: |
          version="$(awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' buildpack.toml)"
          [[ -n "${version}" ]]

          echo "image=${IMAGE_PREFIX}/buildpack-yarn-workspace:${version}" >> "${GITHUB_OUTPUT}"

      - name: Check buildpack group version change
        id: release-change
        env:
          IMAGE: ${{ steps.buildpack-image.outputs.image }}
          VERSION_FILE: buildpacks/yarn-workspace/buildpack.toml
        run: |
          before="${{ github.event.before }}"
          current_version="$(awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' "${VERSION_FILE}")"

          if [[ "${before}" =~ ^0+$ ]]; then
            changed=true
          elif git cat-file -e "${before}:${VERSION_FILE}" 2>/dev/null; then
            previous_version="$(git show "${before}:${VERSION_FILE}" | awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }')"
            if [[ "${previous_version}" != "${current_version}" ]]; then
              changed=true
            else
              changed=false
            fi
          else
            changed=true
          fi

          if [[ "${changed}" == "false" ]] && ! docker buildx imagetools inspect "${IMAGE}" > /dev/null 2>&1; then
            changed=true
          fi

          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"

      - name: Prepare buildpack package
        if: steps.release-change.outputs.changed == 'true'
        id: buildpack-package
        run: |
          package_config="${RUNNER_TEMP}/yarn-workspace-package.toml"
          stage_dir="${RUNNER_TEMP}/yarn-workspace-buildpack"

          ./scripts/prepare-buildpack-package.sh buildpacks/yarn-workspace "${stage_dir}" "${package_config}"

          echo "config=${package_config}" >> "${GITHUB_OUTPUT}"

      - name: Verify buildpack package content
        if: steps.release-change.outputs.changed == 'true'
        env:
          BUILDPACK_ARCHIVE: ${{ runner.temp }}/yarn-workspace
          PACKAGE_CONFIG: ${{ steps.buildpack-package.outputs.config }}
          PLATFORMS: ${{ needs.validate-release.outputs.platforms_csv }}
        run: |
          targets=()
          IFS=',' read -r -a platforms <<< "${PLATFORMS}"
          for platform in "${platforms[@]}"; do
            targets+=(--target "${platform}")
          done

          pack buildpack package "${BUILDPACK_ARCHIVE}" --config "${PACKAGE_CONFIG}" "${targets[@]}" --format file --pull-policy if-not-present

          for platform in "${platforms[@]}"; do
            platform_id="${platform//\//-}"
            ./scripts/verify-buildpack-package.sh "${BUILDPACK_ARCHIVE}-${platform_id}.cnb" buildpacks/yarn-workspace
          done

      - name: Publish ${{ steps.buildpack-image.outputs.image }}
        if: steps.release-change.outputs.changed == 'true'
        env:
          PLATFORMS: ${{ needs.validate-release.outputs.platforms_csv }}
        run: |
          targets=()
          IFS=',' read -r -a platforms <<< "${PLATFORMS}"
          for platform in "${platforms[@]}"; do
            targets+=(--target "${platform}")
          done

          pack buildpack package ${{ steps.buildpack-image.outputs.image }} --config ${{ steps.buildpack-package.outputs.config }} "${targets[@]}" --publish --pull-policy if-not-present

      - name: Verify linux/amd64 and linux/arm64
        if: steps.release-change.outputs.changed == 'true'
        env:
          EXPECTED_PLATFORMS: ${{ needs.validate-release.outputs.platforms_json }}
          IMAGE: ${{ steps.buildpack-image.outputs.image }}
        run: |
          manifest="$(docker buildx imagetools inspect "${IMAGE}" --raw)"
          jq -e --argjson expected_platforms "${EXPECTED_PLATFORMS}" '
            [.manifests[].platform | "\(.os)/\(.architecture)"] as $platforms |
            all($expected_platforms[]; . as $platform | $platforms | index($platform))
          ' <<< "${manifest}" > /dev/null

  verify-stack-manifests:
    name: Verify stack manifests Node ${{ matrix.node_line.node_major }}
    needs:
      - build-stack
      - validate-release
    if: needs.validate-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify linux/amd64 and linux/arm64
        env:
          EXPECTED_PLATFORMS: ${{ needs.validate-release.outputs.platforms_json }}
          IMAGE_PREFIX: ${{ needs.validate-release.outputs.image_prefix }}
          RELEASE_TAG: ${{ matrix.node_line.release_tag }}
        run: |
          images=(
            "${IMAGE_PREFIX}/stack-node:base-${RELEASE_TAG}"
            "${IMAGE_PREFIX}/stack-node:build-${RELEASE_TAG}"
            "${IMAGE_PREFIX}/stack-node:run-${RELEASE_TAG}"
          )

          for image in "${images[@]}"; do
            manifest="$(docker buildx imagetools inspect "${image}" --raw)"
            jq -e --argjson expected_platforms "${EXPECTED_PLATFORMS}" '
              [.manifests[].platform | "\(.os)/\(.architecture)"] as $platforms |
              all($expected_platforms[]; . as $platform | $platforms | index($platform))
            ' <<< "${manifest}" > /dev/null
          done

  publish-builder:
    name: Publish builder Node ${{ matrix.node_line.node_major }}
    needs:
      - build-stack
      - publish-extensions
      - publish-buildpack-group
      - validate-release
      - verify-stack-manifests
    if: needs.validate-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pack
        uses: buildpacks/github-actions/setup-pack@v5.12.1
        with:
          pack-version: ${{ env.PACK_VERSION }}

      - name: Setup gettext
        run: sudo apt-get update && sudo apt-get install --yes gettext-base

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish builder
        env:
          BUILDER_CONFIG: ${{ runner.temp }}/builder.release.toml
          IMAGE_PREFIX: ${{ needs.validate-release.outputs.image_prefix }}
          PLATFORMS: ${{ needs.validate-release.outputs.platforms_csv }}
          RELEASE_TAG: ${{ matrix.node_line.release_tag }}
        run: |
          envsubst "\${IMAGE_PREFIX} \${RELEASE_TAG}" < builders/base/builder.release.toml > "${BUILDER_CONFIG}"

          targets=()
          IFS=',' read -r -a platforms <<< "${PLATFORMS}"
          for platform in "${platforms[@]}"; do
            targets+=(--target "${platform}")
          done

          pack builder create "${IMAGE_PREFIX}/builder-base:${RELEASE_TAG}" --verbose --config "${BUILDER_CONFIG}" "${targets[@]}" --publish --pull-policy if-not-present

  verify-builder-manifest:
    name: Verify builder manifest Node ${{ matrix.node_line.node_major }}
    needs:
      - publish-builder
      - validate-release
    if: needs.validate-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify linux/amd64 and linux/arm64
        env:
          EXPECTED_PLATFORMS: ${{ needs.validate-release.outputs.platforms_json }}
          IMAGE: ${{ needs.validate-release.outputs.image_prefix }}/builder-base:${{ matrix.node_line.release_tag }}
        run: |
          manifest="$(docker buildx imagetools inspect "${IMAGE}" --raw)"
          jq -e --argjson expected_platforms "${EXPECTED_PLATFORMS}" '
            [.manifests[].platform | "\(.os)/\(.architecture)"] as $platforms |
            all($expected_platforms[]; . as $platform | $platforms | index($platform))
          ' <<< "${manifest}" > /dev/null

  scan-release-images:
    name: Scan ${{ matrix.image_kind }} Node ${{ matrix.node_line.node_major }} ${{ matrix.platform }}
    needs:
      - validate-release
      - verify-builder-manifest
      - verify-stack-manifests
    if: needs.validate-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
        platform: ${{ fromJson(needs.validate-release.outputs.platforms_json) }}
        image_kind:
          - builder-base
          - stack-node-base
          - stack-node-build
          - stack-node-run
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve scan image
        id: scan-image
        env:
          IMAGE_KIND: ${{ matrix.image_kind }}
          IMAGE_PREFIX: ${{ needs.validate-release.outputs.image_prefix }}
          NODE_MAJOR: ${{ matrix.node_line.node_major }}
          PLATFORM: ${{ matrix.platform }}
          RELEASE_TAG: ${{ matrix.node_line.release_tag }}
        run: |
          case "${IMAGE_KIND}" in
            builder-base)
              image="${IMAGE_PREFIX}/builder-base:${RELEASE_TAG}"
              ;;
            stack-node-base)
              image="${IMAGE_PREFIX}/stack-node:base-${RELEASE_TAG}"
              ;;
            stack-node-build)
              image="${IMAGE_PREFIX}/stack-node:build-${RELEASE_TAG}"
              ;;
            stack-node-run)
              image="${IMAGE_PREFIX}/stack-node:run-${RELEASE_TAG}"
              ;;
            *)
              echo "::error::Unsupported image kind '${IMAGE_KIND}'."
              exit 1
              ;;
          esac

          sarif="$(printf 'trivy-%s-%s-%s.sarif' "${IMAGE_KIND}" "${RELEASE_TAG}" "${PLATFORM}" | tr '/:' '--')"
          platform_id="$(printf '%s' "${PLATFORM}" | tr '/:' '--')"

          {
            echo "image=${image}"
            echo "sarif=${sarif}"
            echo "category=container/${IMAGE_KIND}/${NODE_MAJOR}/${platform_id}"
          } >> "${GITHUB_OUTPUT}"

      - name: Configure Trivy platform
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          cat > trivy.yaml <<EOF
          image:
            platform: ${PLATFORM}
            source:
              - remote
          EOF

      - name: Report fixed vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.scan-image.outputs.image }}
          trivy-config: trivy.yaml
          format: sarif
          output: ${{ steps.scan-image.outputs.sarif }}
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM
          limit-severities-for-sarif: true

      - name: Upload vulnerability report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan-image.outputs.sarif }}
          category: ${{ steps.scan-image.outputs.category }}

      - name: Gate critical fixed vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.scan-image.outputs.image }}
          trivy-config: trivy.yaml
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
          skip-setup-trivy: true

  verify-node:
    name: Verify Node.js stack-node:${{ matrix.stack }}-${{ matrix.node_line.node_major }} ${{ matrix.platform }}
    needs:
      - scan-release-images
      - validate-release
    if: needs.validate-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
        platform: ${{ fromJson(needs.validate-release.outputs.platforms_json) }}
        stack:
          - build
          - run
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Node.js major
        env:
          EXPECTED_NODE_MAJOR: ${{ matrix.node_line.node_major }}
          IMAGE: ${{ needs.validate-release.outputs.image_prefix }}/stack-node:${{ matrix.stack }}-${{ matrix.node_line.release_tag }}
          PLATFORM: ${{ matrix.platform }}
        run: docker run --rm --pull always --platform "${PLATFORM}" "${IMAGE}" node --version | grep "^v${EXPECTED_NODE_MAJOR}\\."

  verify-builder-node:
    name: Verify Node.js builder ${{ matrix.node_line.node_major }} ${{ matrix.platform }}
    needs:
      - scan-release-images
      - validate-release
    if: needs.validate-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
        platform: ${{ fromJson(needs.validate-release.outputs.platforms_json) }}
    steps:
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Node.js major
        env:
          EXPECTED_NODE_MAJOR: ${{ matrix.node_line.node_major }}
          IMAGE: ${{ needs.validate-release.outputs.image_prefix }}/builder-base:${{ matrix.node_line.release_tag }}
          PLATFORM: ${{ matrix.platform }}
        run: docker run --rm --pull always --platform "${PLATFORM}" --entrypoint node "${IMAGE}" --version | grep "^v${EXPECTED_NODE_MAJOR}\\."

  promote-release-images:
    name: Promote release images Node ${{ matrix.node_line.node_major }}
    needs:
      - publish-buildpack-group
      - scan-release-images
      - validate-release
      - verify-builder-node
      - verify-node
    if: needs.validate-release.outputs.release_enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        node_line: ${{ fromJson(needs.validate-release.outputs.node_lines) }}
    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote stack and builder tags
        env:
          DEFAULT_NODE_MAJOR: ${{ needs.validate-release.outputs.default_node_major }}
          BUILDPACK_GROUP_IMAGE: ${{ needs.publish-buildpack-group.outputs.image }}
          IMAGE_PREFIX: ${{ needs.validate-release.outputs.image_prefix }}
          NODE_MAJOR: ${{ matrix.node_line.node_major }}
          RELEASE_TAG: ${{ matrix.node_line.release_tag }}
        run: |
          base_tags=(--tag "${IMAGE_PREFIX}/stack-node:base-${NODE_MAJOR}")
          build_tags=(--tag "${IMAGE_PREFIX}/stack-node:build-${NODE_MAJOR}")
          run_tags=(--tag "${IMAGE_PREFIX}/stack-node:run-${NODE_MAJOR}")

          if [[ "${NODE_MAJOR}" == "${DEFAULT_NODE_MAJOR}" ]]; then
            base_tags+=(--tag "${IMAGE_PREFIX}/stack-node:base")
            build_tags+=(--tag "${IMAGE_PREFIX}/stack-node:build")
            run_tags+=(--tag "${IMAGE_PREFIX}/stack-node:run")
          fi

          docker buildx imagetools create \
            "${base_tags[@]}" \
            "${IMAGE_PREFIX}/stack-node:base-${RELEASE_TAG}"

          docker buildx imagetools create \
            "${build_tags[@]}" \
            "${IMAGE_PREFIX}/stack-node:build-${RELEASE_TAG}"

          docker buildx imagetools create \
            "${run_tags[@]}" \
            "${IMAGE_PREFIX}/stack-node:run-${RELEASE_TAG}"

          docker buildx imagetools create \
            --tag "${IMAGE_PREFIX}/builder-base:${NODE_MAJOR}" \
            "${IMAGE_PREFIX}/builder-base:${RELEASE_TAG}"

          docker buildx imagetools create \
            --tag "${IMAGE_PREFIX}/buildpack-yarn-workspace:${NODE_MAJOR}" \
            "${BUILDPACK_GROUP_IMAGE}"
