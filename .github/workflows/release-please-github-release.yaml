name: Release Please GitHub release

on:
  workflow_run:
    workflows:
      - Docker release
    branches:
      - master
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-github-release
  cancel-in-progress: false

jobs:
  detect-release-head:
    name: Detect release head
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.release-head.outputs.should_release }}
    steps:
      - name: Checkout Docker release head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check release manifest change
        id: release-head
        env:
          RELEASE_HEAD: ${{ github.event.workflow_run.head_sha }}
        run: |
          first_parent="$(git rev-parse "${RELEASE_HEAD}^1")"

          if git diff --name-only "${first_parent}" "${RELEASE_HEAD}" -- .release-please-manifest.json | grep -qx '.release-please-manifest.json'; then
            echo 'should_release=true' >> "${GITHUB_OUTPUT}"
          else
            echo 'should_release=false' >> "${GITHUB_OUTPUT}"
          fi

  release-please:
    name: Release Please GitHub release
    needs: detect-release-head
    if: ${{ needs.detect-release-head.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub releases
        uses: googleapis/release-please-action@v4.4.1
        with:
          token: ${{ secrets.PAT_token }}
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true
