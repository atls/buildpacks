name: Checks

on:
  pull_request:

jobs:
  cnb-version-refs:
    name: CNB version refs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify CNB version refs
        run: python3 scripts/verify-cnb-version-refs.py

  check:
    name: Checks
    uses: atls/shared/.github/workflows/checks.yaml@master
    permissions: write-all
    with:
      node-version: '22'
