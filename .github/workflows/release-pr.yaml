name: Release PR

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/release-pr.yaml'
      - '.github/workflows/github-release.yaml'
      - '.release-please-manifest.json'
      - '.yarn/**'
      - '.yarnrc.yml'
      - 'release-please-config.json'
      - 'builders/**'
      - 'buildpacks/**'
      - 'extensions/**'
      - 'libcnb/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'yarn.lock'

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  detect-release-head:
    name: Detect release head
    runs-on: ubuntu-latest
    outputs:
      should_create_pr: ${{ steps.release-head.outputs.should_create_pr }}
    steps:
      - name: Check pending release head
        id: release-head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_HEAD: ${{ github.sha }}
        run: |
          is_pending_release_head=false
          mapfile -t pending_release_heads < <(
            gh pr list \
              --state merged \
              --label 'release: pending' \
              --limit 100 \
              --json mergeCommit \
              --jq '.[] | .mergeCommit.oid // empty'
          )

          for pending_release_head in "${pending_release_heads[@]}"; do
            if [[ "${pending_release_head}" == "${RELEASE_HEAD}" ]]; then
              is_pending_release_head=true
              break
            fi
          done

          echo "is_pending_release_head=${is_pending_release_head}"

          if [[ "${is_pending_release_head}" == 'true' ]]; then
            echo 'should_create_pr=false' >> "${GITHUB_OUTPUT}"
          else
            echo 'should_create_pr=true' >> "${GITHUB_OUTPUT}"
          fi

  release-pr:
    name: Release PR
    needs: detect-release-head
    if: ${{ needs.detect-release-head.outputs.should_create_pr == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ATLANTIS_SUPER_BOT_APP_ID }}
          private-key: ${{ secrets.ATLANTIS_SUPER_BOT_PRIVATE_KEY }}

      - name: Create release PR
        uses: googleapis/release-please-action@v4.4.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

      - name: Enable release PR auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_PR_BRANCH: release-please--branches--master
          RELEASE_PR_LABEL: 'release: pending'
        run: |
          mapfile -t release_prs < <(
            gh pr list \
              --state open \
              --head "${RELEASE_PR_BRANCH}" \
              --label "${RELEASE_PR_LABEL}" \
              --json number,isDraft,headRefName \
              --jq '.[] | [.number, .isDraft, .headRefName] | @tsv'
          )

          release_pr_count="${#release_prs[@]}"
          if [[ "${release_pr_count}" -eq 0 ]]; then
            echo 'No release PR found for auto-merge'
            exit 0
          fi

          if [[ "${release_pr_count}" -ne 1 ]]; then
            echo "Expected exactly one release PR, got ${release_pr_count}" >&2
            exit 1
          fi

          read -r release_pr_number release_pr_draft release_pr_head <<< "${release_prs[0]}"

          if [[ "${release_pr_head}" != "${RELEASE_PR_BRANCH}" ]]; then
            echo "Unexpected release PR head: ${release_pr_head}" >&2
            exit 1
          fi

          if [[ "${release_pr_draft}" == 'true' ]]; then
            echo "Release PR #${release_pr_number} is draft" >&2
            exit 1
          fi

          gh pr merge "${release_pr_number}" --auto --merge
