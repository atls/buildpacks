name: GitHub release

on:
  workflow_run:
    workflows:
      - Docker release
    branches:
      - master
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: github-release
  cancel-in-progress: false

jobs:
  detect-release-head:
    name: Detect release head
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      should_release: ${{ steps.release-head.outputs.should_release }}
    steps:
      - name: Checkout Docker release head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check release manifest change
        id: release-head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_HEAD: ${{ github.event.workflow_run.head_sha }}
        run: |
          first_parent="$(git rev-parse "${RELEASE_HEAD}^1")"
          manifest_changed=false
          if git diff --name-only "${first_parent}" "${RELEASE_HEAD}" -- .release-please-manifest.json | grep -qx '.release-please-manifest.json'; then
            manifest_changed=true
          fi

          mapfile -t pending_release_prs < <(
            gh pr list \
              --state merged \
              --label 'autorelease: pending' \
              --limit 100 \
              --json number,mergeCommit \
              --jq '.[] | [.number, .mergeCommit.oid] | @tsv'
          )

          pending_release_count="${#pending_release_prs[@]}"
          pending_release_head=''
          if [[ "${pending_release_count}" -eq 1 ]]; then
            pending_release_head="$(awk '{ print $2 }' <<< "${pending_release_prs[0]}")"
          fi

          echo "manifest_changed=${manifest_changed}"
          echo "pending_release_count=${pending_release_count}"
          echo "pending_release_head=${pending_release_head}"

          if [[ "${manifest_changed}" == 'true' && "${pending_release_count}" -eq 1 && "${pending_release_head}" == "${RELEASE_HEAD}" ]]; then
            echo 'should_release=true' >> "${GITHUB_OUTPUT}"
          else
            echo 'should_release=false' >> "${GITHUB_OUTPUT}"
          fi

  github-release:
    name: GitHub release
    needs: detect-release-head
    if: ${{ needs.detect-release-head.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ATLANTIS_SUPER_BOT_APP_ID }}
          private-key: ${{ secrets.ATLANTIS_SUPER_BOT_PRIVATE_KEY }}

      - name: Create GitHub releases
        uses: googleapis/release-please-action@v4.4.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: master
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true
