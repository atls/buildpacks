name: Update channel tags
description: Move stable Node channel tags after all release checks pass.
inputs:
  default-node-major:
    description: Default Node.js major release line.
    required: true
  image-prefix:
    description: Image namespace prefix.
    required: true
  node-major:
    description: Node.js major release line.
    required: true
  release-tag:
    description: Immutable release tag suffix.
    required: true
  buildpack-directory:
    description: Composite buildpack directory used for the channel tag.
    default: buildpacks/yarn-workspace
  buildpack-image-repository:
    description: Composite buildpack image repository without tag.
    default: ''
runs:
  using: composite
  steps:
    - name: Update stack, builder, and buildpack channel tags
      shell: bash
      env:
        BUILDPACK_DIRECTORY: ${{ inputs.buildpack-directory }}
        BUILDPACK_IMAGE_REPOSITORY: ${{ inputs.buildpack-image-repository }}
        DEFAULT_NODE_MAJOR: ${{ inputs.default-node-major }}
        IMAGE_PREFIX: ${{ inputs.image-prefix }}
        NODE_MAJOR: ${{ inputs.node-major }}
        RELEASE_TAG: ${{ inputs.release-tag }}
      run: |
        base_tags=(--tag "${IMAGE_PREFIX}/stack-node:base-${NODE_MAJOR}")
        build_tags=(--tag "${IMAGE_PREFIX}/stack-node:build-${NODE_MAJOR}")
        run_tags=(--tag "${IMAGE_PREFIX}/stack-node:run-${NODE_MAJOR}")

        if [[ "${NODE_MAJOR}" == "${DEFAULT_NODE_MAJOR}" ]]; then
          base_tags+=(--tag "${IMAGE_PREFIX}/stack-node:base")
          build_tags+=(--tag "${IMAGE_PREFIX}/stack-node:build")
          run_tags+=(--tag "${IMAGE_PREFIX}/stack-node:run")
        fi

        docker buildx imagetools create \
          "${base_tags[@]}" \
          "${IMAGE_PREFIX}/stack-node:base-${RELEASE_TAG}"

        docker buildx imagetools create \
          "${build_tags[@]}" \
          "${IMAGE_PREFIX}/stack-node:build-${RELEASE_TAG}"

        docker buildx imagetools create \
          "${run_tags[@]}" \
          "${IMAGE_PREFIX}/stack-node:run-${RELEASE_TAG}"

        docker buildx imagetools create \
          --tag "${IMAGE_PREFIX}/builder-base:${NODE_MAJOR}" \
          "${IMAGE_PREFIX}/builder-base:${RELEASE_TAG}"

        buildpack_image_repository="${BUILDPACK_IMAGE_REPOSITORY:-${IMAGE_PREFIX}/buildpack-yarn-workspace}"
        buildpack_version="$(awk -F' *= *' '$1 == "version" { gsub(/"/, "", $2); print $2; exit }' "${BUILDPACK_DIRECTORY}/buildpack.toml")"
        if [[ -z "${buildpack_version}" ]]; then
          echo "::error::Failed to resolve buildpack version from ${BUILDPACK_DIRECTORY}/buildpack.toml."
          exit 1
        fi

        docker buildx imagetools create \
          --tag "${buildpack_image_repository}:${NODE_MAJOR}" \
          "${buildpack_image_repository}:${buildpack_version}"
