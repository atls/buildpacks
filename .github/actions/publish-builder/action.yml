name: Publish builder
description: Render the builder config for a release tag and publish the builder image.
inputs:
  image-prefix:
    description: Image namespace prefix.
    required: true
  platforms:
    description: Comma-separated target platforms.
    required: true
  release-tag:
    description: Immutable release tag suffix.
    required: true
  builder-config-template:
    description: Source builder config template.
    default: builders/base/builder.release.toml
outputs:
  image:
    description: Published builder image reference.
    value: ${{ steps.builder.outputs.image }}
runs:
  using: composite
  steps:
    - name: Publish builder image
      id: builder
      shell: bash
      env:
        BUILDER_CONFIG_TEMPLATE: ${{ inputs.builder-config-template }}
        IMAGE_PREFIX: ${{ inputs.image-prefix }}
        PLATFORMS: ${{ inputs.platforms }}
        RELEASE_TAG: ${{ inputs.release-tag }}
      run: |
        rendered_config="${RUNNER_TEMP}/builder.toml"
        while IFS= read -r line || [[ -n "${line}" ]]; do
          line="${line//\$\{IMAGE_PREFIX\}/${IMAGE_PREFIX}}"
          line="${line//\$\{RELEASE_TAG\}/${RELEASE_TAG}}"
          printf '%s\n' "${line}"
        done < "${BUILDER_CONFIG_TEMPLATE}" > "${rendered_config}"

        targets=()
        IFS=',' read -r -a platforms <<< "${PLATFORMS}"
        for platform in "${platforms[@]}"; do
          targets+=(--target "${platform}")
        done

        image="${IMAGE_PREFIX}/builder-base:${RELEASE_TAG}"
        pack builder create "${image}" --verbose --config "${rendered_config}" "${targets[@]}" --publish --pull-policy if-not-present

        echo "image=${image}" >> "${GITHUB_OUTPUT}"
