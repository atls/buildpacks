api = "0.10"

[buildpack]
id = "tech.atlantislab.buildpacks.yarn-install"
version = "0.1.2"
name = "Yarn Install Buildpack"

[metadata]
include-files = ["dist", "bin/build", "bin/detect", "buildpack.toml"]
pre-package = "yarn build"

[[targets]]
os = "linux"
arch = "amd64"

[[targets]]
os = "linux"
arch = "arm64"
