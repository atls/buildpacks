[[order]]

[lifecycle]
version = "0.21.12"

[build]
image = "${IMAGE_PREFIX}/stack-node:build-${RELEASE_TAG}"

[run]
[[run.images]]
image = "${IMAGE_PREFIX}/stack-node:run-${RELEASE_TAG}"

[[targets]]
os = "linux"
arch = "amd64"

[[targets]]
os = "linux"
arch = "arm64"

[[extensions]]
id = "tech.atls.extensions.curl"
uri = "docker://ghcr.io/atls/buildpack-extension-curl:0.0.4" # x-release-please-version

[[extensions]]
id = "tech.atls.extensions.htop"
uri = "docker://ghcr.io/atls/buildpack-extension-htop:0.0.4" # x-release-please-version

[[extensions]]
id = "tech.atls.extensions.graphql-hive"
uri = "docker://ghcr.io/atls/buildpack-extension-graphql-hive:0.0.4" # x-release-please-version

[[order-extensions]]
[[order-extensions.group]]
id = "tech.atls.extensions.curl"

[[order-extensions.group]]
id = "tech.atls.extensions.htop"

[[order-extensions.group]]
id = "tech.atls.extensions.graphql-hive"

# Deprecated
[stack]
id = "tech.atls.stacks.node"
